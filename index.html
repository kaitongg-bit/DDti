<style>
:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--color-background-secondary); color: var(--color-text-primary); }
.app { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; min-height: 100vh; background: var(--color-background-primary); box-shadow: 0 4px 20px rgba(123, 87, 209, 0.08); }

.cover-sub { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 0.5rem; line-height: 1.6; }
.cover-tag { display: inline-block; background: var(--theme-light); color: var(--theme-dark); font-size: 13px; padding: 6px 16px; border-radius: 30px; margin: 1rem 0 2rem; font-weight: 500; }

.start-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(123, 87, 209, 0.35); }

/* 答题区样式 */
.progress-bar { height: 6px; background: var(--color-border-tertiary); border-radius: 3px; margin-bottom: 2rem; overflow: hidden; }
.progress-fill { height: 100%; background: var(--theme-main); border-radius: 3px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.q-counter { font-size: 14px; color: var(--theme-main); font-weight: 500; margin-bottom: 0.8rem; }
.q-text { font-size: 19px; font-weight: 600; line-height: 1.5; margin-bottom: 2rem; }
.options { display: flex; flex-direction: column; gap: 12px; }
.opt-btn { background: var(--color-background-primary); border: 1.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 16px 20px; text-align: left; cursor: pointer; font-size: 15px; color: var(--color-text-primary); line-height: 1.5; transition: all 0.2s; position: relative; overflow: hidden; }
.opt-btn:hover { border-color: #BDA8EB; background: #F7F2FF; }

.nav { display: flex; justify-content: space-between; align-items: center; margin-top: 2.5rem; }
.nav-btn { background: transparent; border: 1.5px solid var(--color-border-secondary); border-radius: 20px; padding: 10px 24px; cursor: pointer; font-size: 15px; color: var(--color-text-secondary); transition: all 0.2s; }
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.nav-btn.primary { background: var(--theme-main); color: white; border-color: var(--theme-main); font-weight: 500; }

/* 结果页样式 */
.result-header { text-align: center; margin-bottom: 2rem; animation: fadeIn 0.8s ease; }
.result-image-frame { width: min(100%, 260px); height: 320px; margin: 0 auto 1rem; border-radius: var(--border-radius-lg); overflow: hidden; box-shadow: 0 8px 20px rgba(123, 87, 209, 0.2); border: 2px solid white; background: #f5f5f5; }

.result-card { background: white; border: 1.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); animation: slideUp 0.6s ease forwards; opacity: 0; transform: translateY(20px); }

.result-card:nth-child(3) { animation-delay: 0.4s; }

.section-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--theme-main); border-radius: 2px; }

.result-role { font-size: 15px; color: var(--color-text-secondary); margin-bottom: 1.2rem; display: inline-block; background: var(--theme-light); padding: 4px 12px; border-radius: 20px; }

.tag { font-size: 13px; padding: 6px 14px; border-radius: 20px; background: #F1EBFF; color: #432A7A; font-weight: 500; border: 1px solid #DCD1FA; }

/* 评分条美化 */
.score-row { margin-bottom: 12px; }
.score-label-wrap { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: var(--color-text-primary); font-weight: 500; }

.psy-analysis { font-size: 15px; line-height: 1.8; color: var(--theme-dark); background: #F7F2FF; padding: 18px; border-radius: 12px; margin-bottom: 1.5rem; border: 1px solid #DCD1FA; text-align: justify; }

.retry-btn:hover { background: var(--theme-light); }
.hidden { display: none !important; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);

function startTest() {
  document.getElementById('cover-page').classList.add('hidden');
  document.getElementById('test-page').classList.remove('hidden');
  renderQ();
}

function renderQ() {
  const q = QUESTIONS[current];
  document.getElementById('q-counter').textContent = `第 ${current+1} / ${QUESTIONS.length} 题`;
  document.getElementById('q-text').textContent = q.q;
  
  setTimeout(() => {
    document.getElementById('progress').style.width = ((current+1)/QUESTIONS.length*100)+'%';
  }, 50);

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o,i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn' + (answers[current]===i ? ' selected' : '');
    btn.textContent = o.t;
    btn.onclick = () => selectOpt(i);
    opts.appendChild(btn);
  });
  
  document.getElementById('back-btn').disabled = current===0;
  
  const nb = document.getElementById('next-btn');
  const fb = document.getElementById('finish-btn');
  if(current === QUESTIONS.length-1){ 
    nb.classList.add('hidden'); 
    fb.classList.remove('hidden'); 
  } else { 
    nb.classList.remove('hidden'); 
    fb.classList.add('hidden'); 
  }
  updateNextBtn();
}

function selectOpt(i) {
  answers[current] = i;
  document.querySelectorAll('.opt-btn').forEach((b,bi)=>{
    b.classList.toggle('selected', bi===i);
  });
  updateNextBtn();
  
  if(current < QUESTIONS.length-1) {
    setTimeout(() => { nextQ(); }, 300);
  }
}

function updateNextBtn() {
  const nb = document.getElementById('next-btn');
  const fb = document.getElementById('finish-btn');
  const sel = answers[current]!==null;
  nb.disabled = !sel;
  fb.disabled = !sel;
}

function nextQ() {
  if(answers[current]===null) return;
  if(current<QUESTIONS.length-1){ current++; renderQ(); }
}
function prevQ() {
  if(current>0){ current--; renderQ(); }
}

function calcScores() {
  // 8 个维度
  const s = {dominant:0, warm:0, playful:0, reliable:0, romantic:0, ambitious:0, rebellious:0, independent:0};
  QUESTIONS.forEach((q,qi)=>{
    if(answers[qi]===null) return;
    const ds = q.opts[answers[qi]].s;
    Object.keys(ds).forEach(k=>{ s[k] = (s[k]||0) + ds[k]; });
  });
  return s;
}

// 8维雷达图欧氏距离匹配（包含道明寺、谢景行在内的 15 个模型，权重精确调校）
function matchChar(s) {
  let totalScore = 0;
  DIMS.forEach(d => totalScore += s[d]);
  if(totalScore === 0) totalScore = 1; 
  
  let userProfile = {};
  DIMS.forEach(d => userProfile[d] = s[d] / totalScore);

  // 15 个角色全新的 8 维数据模型（每一行相加等于 1.0）
  const charProfiles = {
    dongfang: {dominant:0.25, warm:0.05, playful:0.05, reliable:0.10, romantic:0.15, ambitious:0.25, rebellious:0.10, independent:0.05}, 
    xie:      {dominant:0.20, warm:0.05, playful:0.15, reliable:0.10, romantic:0.15, ambitious:0.20, rebellious:0.10, independent:0.05}, // 谢景行：高野心+强拉扯+慕强
    daoming:  {dominant:0.20, warm:0.05, playful:0.15, reliable:0.05, romantic:0.25, ambitious:0.05, rebellious:0.20, independent:0.05}, // 道明寺：极致纯爱+叛逆笨蛋
    ran:      {dominant:0.05, warm:0.10, playful:0.05, reliable:0.35, romantic:0.05, ambitious:0.10, rebellious:0.20, independent:0.10}, 
    qi:       {dominant:0.05, warm:0.25, playful:0.15, reliable:0.10, romantic:0.15, ambitious:0.05, rebellious:0.05, independent:0.20}, 
    xu:       {dominant:0.10, warm:0.15, playful:0.10, reliable:0.10, romantic:0.15, ambitious:0.15, rebellious:0.15, independent:0.10}, 
    biao:     {dominant:0.05, warm:0.10, playful:0.30, reliable:0.10, romantic:0.05, ambitious:0.10, rebellious:0.20, independent:0.10}, 
    cheng:    {dominant:0.05, warm:0.15, playful:0.10, reliable:0.20, romantic:0.10, ambitious:0.15, rebellious:0.05, independent:0.20}, 
    yan:      {dominant:0.20, warm:0.05, playful:0.05, reliable:0.10, romantic:0.20, ambitious:0.20, rebellious:0.05, independent:0.15}, 
    xiao:     {dominant:0.20, warm:0.10, playful:0.05, reliable:0.05, romantic:0.15, ambitious:0.20, rebellious:0.15, independent:0.10}, 
    baima:    {dominant:0.05, warm:0.15, playful:0.10, reliable:0.30, romantic:0.10, ambitious:0.05, rebellious:0.05, independent:0.20}, 
    song:     {dominant:0.10, warm:0.15, playful:0.05, reliable:0.20, romantic:0.15, ambitious:0.05, rebellious:0.05, independent:0.25}, 
    taohuawo: {dominant:0.05, warm:0.15, playful:0.25, reliable:0.10, romantic:0.05, ambitious:0.10, rebellious:0.10, independent:0.20}, 
    yuzhou:   {dominant:0.10, warm:0.20, playful:0.20, reliable:0.10, romantic:0.05, ambitious:0.10, rebellious:0.10, independent:0.15}, 
    kechan:   {dominant:0.05, warm:0.20, playful:0.05, reliable:0.30, romantic:0.05, ambitious:0.15, rebellious:0.05, independent:0.15}  
  };

  let best = 'dongfang', minDistance = Infinity;
  Object.keys(charProfiles).forEach(cid => {
    let dist = 0;
    DIMS.forEach(d => {
      dist += Math.pow(userProfile[d] - charProfiles[cid][d], 2);
    });
    if(dist < minDistance) {
      minDistance = dist;
      best = cid;
    }
  });
  
  return best;
}

function showResult() {
  if(answers[current]===null) return;
  const s = calcScores();
  const charId = matchChar(s);
  const c = CHARS[charId];
  
  // 寻找用户的最大值，用于计算雷达条的百分比
  const maxS = Math.max(...Object.values(s)) || 1;
  
  // 找出得分最高的维度用于【核心心理画像】
  let topDim = 'warm';
  let topDimScore = -1;
  Object.keys(s).forEach(k => {
    if(s[k] > topDimScore) { topDimScore = s[k]; topDim = k; }
  });

  document.getElementById('test-page').classList.add('hidden');
  const rp = document.getElementById('result-page');
  rp.classList.remove('hidden');

  // 生成 8 维评分条 HTML
  const barsHtml = DIMS.map(d => {
    let percent = Math.round((s[d] / maxS) * 100);
    if (percent < 5) percent = 5; 
    
    const isTop = (d === topDim);
    const barGradient = isTop ? 'linear-gradient(90deg, #7B57D1, #432A7A)' : 'linear-gradient(90deg, #B79AF0, #7B57D1)';
    const textWeight = isTop ? '600' : '500';
    const textColor = isTop ? 'var(--theme-main)' : 'var(--color-text-primary)';

    return `
    <div class="score-row">
      <div class="score-label-wrap" style="color: ${textColor}; font-weight: ${textWeight};">
        <span>${DIM_LABELS[d].title}</span>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" style="width:0%; background: ${barGradient};" data-width="${percent}%"></div>
      </div>
      <div class="score-desc" style="margin-top:4px;">${DIM_LABELS[d].desc}</div>
    </div>`;
  }).join('');

  const tagsHtml = c.tags.map(t=>`<span class="tag"># ${t}</span>`).join('');

  // 构建图片 HTML
  const imageHtml = c.img ? `<div class="result-image-frame"><img src="${c.img}" alt="${c.name}" class="result-img"></div>` : '';

  rp.innerHTML = `
    <div class="result-header">
      <div style="font-size:14px;color:var(--color-text-secondary);margin-bottom:0.5rem;letter-spacing:1px;">平行宇宙中，你灵魂的最终锚点是</div>
      ${imageHtml}
      <div class="result-name">${c.name}</div>
      <div class="result-role">${c.role}</div>
    </div>
    
    <div class="result-card">
      <div class="section-title">人物设定与羁绊</div>
      <div class="result-desc">${c.desc}</div>
      <div class="psy-match">${c.psyMatch}</div>
      <div class="result-tags">${tagsHtml}</div>
    </div>

    <div class="result-card">
      <div class="section-title">深层心理剖析：你为何会选他？</div>
      <div class="psy-analysis">
        ${PSY_PROFILES[topDim]}
      </div>
      <div style="font-size:14px;color:var(--theme-dark);margin-bottom:14px; margin-top:1.5rem; font-weight:600;">你的 8 维潜意识雷达数据：</div>
      <div class="score-bars">${barsHtml}</div>
    </div>

    <button class="retry-btn" onclick="retryTest()">↺ 重新开启意识连结</button>
  `;

  // 延迟触发进度条动画
  setTimeout(() => {
    document.querySelectorAll('.score-bar-fill').forEach(bar => {
      bar.style.width = bar.getAttribute('data-width');
    });
  }, 100);
}

function retryTest() {
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('progress').style.width = '0%';
  document.getElementById('result-page').classList.add('hidden');
  document.getElementById('cover-page').classList.remove('hidden');
}
</script>
